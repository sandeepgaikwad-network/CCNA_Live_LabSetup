name: CI/CD Pipeline for CCNA_Live_LabSetup

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  link-check:
    name: 🔗 Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate Markdown links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress README.md index.md docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: 🛠️ Build Site
    runs-on: ubuntu-latest
    needs: link-check
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Jekyll
        run: gem install jekyll bundler

      - name: Build site
        run: jekyll build -d ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Basic HTML validation
        run: |
          sudo apt-get install tidy -y
          tidy -errors ./_site/index.html || true

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
