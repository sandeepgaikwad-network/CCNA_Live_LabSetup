name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write   # Critical: allow GITHUB_TOKEN to push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'   # Node 20 is deprecated, use 24

      - name: Build site
        run: |
          # If you have a build step (like Jekyll, Hugo, or MkDocs), add it here.
          # For plain Markdown + assets, you can skip this step.
          echo "No build step required"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./   # Replace with ./public or ./docs if you have a build output folder
